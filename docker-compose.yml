version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: resqcity-db
    environment:
      POSTGRES_USER: resqcity
      POSTGRES_PASSWORD: resqcity123
      POSTGRES_DB: resqcity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: resqcity-app
    environment:
      DATABASE_URL: "postgresql://resqcity:resqcity123@postgres:5432/resqcity?schema=public"
      JWT_SECRET: "change-this-secret-in-production"
      NODE_ENV: "production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_WEBSOCKET_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm start
      "

volumes:
  postgres_data:
